name: VPS8-Signin

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00（北京时间 09:00）

jobs:
  signin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/VPS8-Signin-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/signin.py signin.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🌐 设置 Cloudflare WARP 出口 (降低验证码难度)
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable xvfb unzip

      - name: 🧩 下载 Buster 验证码破解扩展
        run: |
          wget -q https://github.com/dessant/buster/releases/download/v2.0.1/buster-extension-2.0.1-chrome.zip -O buster.zip
          unzip -q buster.zip -d buster_extension
          rm buster.zip

      - name: 🐍 安装 Python 依赖
        run: pip install seleniumbase requests

      - name: 🚀 运行签到脚本
        env:
          PYTHONIOENCODING: utf-8
          VPS8_ACCOUNT: ${{ secrets.VPS8_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python signin.py

      - name: 📸 上传报错截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
